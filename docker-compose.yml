version: "3.8"

services:
  app:
    build: .
    container_name: pm-travel-crm
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_TYPE=sqlite
      - PG_HOST=db
      - PG_PORT=5432
      - PG_DATABASE=${POSTGRES_DB:-crm_db}
      - PG_USER=${POSTGRES_USER:-crm_user}
      - PG_PASSWORD=${POSTGRES_PASSWORD:-crm_password}
      - PG_SSL_MODE=disable
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - FROM_EMAIL=${FROM_EMAIL}
      - FROM_NAME=${FROM_NAME}
      - CRM_API_KEY=${CRM_API_KEY}
      - CRM_ALLOWED_ORIGINS=${CRM_ALLOWED_ORIGINS}
      - CRM_URL=${CRM_URL}
      - TRACKING_DOMAIN=${TRACKING_DOMAIN}
      - N8N_URL=${N8N_URL}
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - GOOGLE_SEARCH_API_KEY=${GOOGLE_SEARCH_API_KEY}
      - GOOGLE_SEARCH_CX=${GOOGLE_SEARCH_CX}
      - SERP_API_KEY=${SERP_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_FROM=${TWILIO_WHATSAPP_FROM}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    volumes:
      - crm_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.pm-travel-crm.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - crm-network

  db:
    image: postgres:15-alpine
    container_name: pm-travel-crm-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-crm_db}
      - POSTGRES_USER=${POSTGRES_USER:-crm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-crm_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm-network

volumes:
  crm_data:
    driver: local
  postgres_data:
    driver: local

networks:
  crm-network:
    driver: bridge
